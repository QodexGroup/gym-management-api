steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE_REPO}/${_IMAGE_NAME}:$SHORT_SHA'
      - '-t'
      - '${_IMAGE_REPO}/${_IMAGE_NAME}:latest'
      - '.'

  # Push the Docker image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE_REPO}/${_IMAGE_NAME}:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE_REPO}/${_IMAGE_NAME}:latest'

  # Update Cloud Run service image only.
  # This preserves env vars, secrets, Cloud SQL connections, and other settings
  # configured directly in Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_IMAGE_REPO}/${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'

  # Update Cloud Run Jobs to use the same freshly built image tag.
  # Set multiple job names in _JOB_NAMES separated by commas.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        IFS=',' read -ra JOBS <<< "${_JOB_NAMES}"
        for job in "${JOBS[@]}"; do
          echo "Updating job: ${job}"
          gcloud run jobs update "${job}" \
            --image "${_IMAGE_REPO}/${_IMAGE_NAME}:$SHORT_SHA" \
            --region "${_REGION}"
        done

images:
  - '${_IMAGE_REPO}/${_IMAGE_NAME}:$SHORT_SHA'
  - '${_IMAGE_REPO}/${_IMAGE_NAME}:latest'

substitutions:
  _REGION: 'asia-southeast1'
  _SERVICE_NAME: 'gym-management-api'
  _JOB_NAMES: 'payment-request'
  _IMAGE_REPO: 'gcr.io/$PROJECT_ID'
  _IMAGE_NAME: 'gym-management-api'

options:
  logging: CLOUD_LOGGING_ONLY

